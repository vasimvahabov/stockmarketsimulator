spring:
  application:
    name: stockmarketsimulator
  profiles:
    active: ${ACTIVE_PROFILE:local}
#  main.allow-bean-definition-overriding: true

finnhub:
  base-url: 'https://finnhub.io/api/'
  api-key: ${FINNHUB_API_KEY}
  api-version: 'v1'

executor:
  stock:
#    initial-delay: ${INITIAL_DELAY_STOCK_EXECUTOR:60}
    period: ${PERIOD_STOCK_STOCK_EXECUTOR:86400000}
    time-unit: ${TIME_UNIT_STOCK_EXECUTOR:MILLISECONDS}
