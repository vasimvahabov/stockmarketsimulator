spring:
  application:
    name: stockmarketsimulator
  profiles:
    active: "${ACTIVE_PROFILE:local}"
#  main.allow-bean-definition-overriding: true

finnhub:
  base-url: ${FINNHUB_BASE_URL:"https://finnhub.io/api/"}
  auth-header: ${FINNHUB_AUTH_HEADER:"X-Finnhub-Token"}
  api-version: ${FINNHUB_API_VERSION:"v1"}
  api-key: ${FINNHUB_API_KEY}

executor:
  stock:
    thread-pool-size: "${QUOTE_EXECUTOR_REST_THREAD_POOL_SIZE:1}"
    period: "${STOCK_EXECUTOR_REST_PERIOD:86400000}"
    time-unit: "${STOCK_EXECUTOR_REST_TIME_UNIT:MILLISECONDS}"